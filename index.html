<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10space</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f2f2f7; color: #1c1c1e; height: 100vh; overflow: hidden; }

    /* LOGIN */
    body.login-page { display: flex; align-items: center; justify-content: center; background: #f2f2f7; overflow: auto; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px; text-align: center; width: 320px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
    .login-card h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .login-card p { color: #6e6e73; margin-bottom: 24px; }
    .primary-btn { width: 100%; padding: 14px; font-size: 16px; background: #EE220C; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
    .primary-btn:hover { background: #cc1a09; }
    .error { color: #EE220C; font-size: 14px; margin-top: 12px; }
    .hidden { display: none; }

    /* APP LAYOUT */
    #app-screen { display: flex; flex-direction: column; height: 100vh; }

    /* TOPBAR */
    .topbar { background: #fff; border-bottom: 1px solid #e5e5ea; padding: 0 16px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-left h1 { font-size: 17px; font-weight: 700; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
    .user-name { font-size: 13px; color: #6e6e73; }
    .logout-btn { font-size: 13px; color: #6e6e73; background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
    .logout-btn:hover { background: #f2f2f7; }

    /* MAIN AREA */
    .app-body { display: flex; flex: 1; overflow: hidden; }

    /* LEFT SIDEBAR */
    .left-sidebar { width: 220px; background: #fff; border-right: 1px solid #e5e5ea; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
    .sidebar-logo { padding: 16px 16px 8px; }
    .sidebar-tabs { display: flex; flex-direction: column; gap: 2px; padding: 4px 8px; }
    .sidebar-tab { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #1c1c1e; border: none; background: none; width: 100%; text-align: left; }
    .sidebar-tab:hover { background: #f2f2f7; }
    .sidebar-tab.active { background: #fff0ee; color: #EE220C; font-weight: 600; }
    .sidebar-tab svg { flex-shrink: 0; }
    .sidebar-divider { height: 1px; background: #e5e5ea; margin: 8px 16px; }
    .sidebar-section-title { font-size: 11px; font-weight: 600; color: #8e8e93; padding: 8px 20px 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* UPLOAD BUTTON */
    .upload-btn-wrap { padding: 12px 16px; }
    .upload-btn { width: 100%; padding: 9px; background: #EE220C; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .upload-btn:hover { background: #cc1a09; }

    /* MAIN CONTENT */
    .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .content-header { padding: 20px 24px 12px; border-bottom: 1px solid #e5e5ea; background: #fff; }
    .content-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .content-subtitle { font-size: 13px; color: #8e8e93; }
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #6e6e73; margin-top: 8px; flex-wrap: wrap; }
    .breadcrumb span { cursor: pointer; }
    .breadcrumb span:hover { color: #EE220C; }
    .breadcrumb .sep { color: #c7c7cc; }

    /* MULTI-SELECT TOOLBAR */
    .multi-toolbar { background: #f2f2f7; color: #1c1c1e; border-bottom: 1px solid #e5e5ea; padding: 0 24px; height: 48px; display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500; }
    .multi-toolbar-btn { background: #fff; border: 1px solid #e5e5ea; color: #1c1c1e; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .multi-toolbar-btn:hover { background: #e5e5ea; }
    .multi-toolbar-btn.danger { color: #EE220C; border-color: #EE220C; }

    /* LIST VIEW */
    .list-container { padding: 0; }
    .list-header { display: grid; grid-template-columns: 32px 1fr 100px 140px 140px 40px; gap: 8px; padding: 8px 24px; font-size: 12px; font-weight: 600; color: #8e8e93; border-bottom: 1px solid #f2f2f7; background: #fff; position: sticky; top: 0; z-index: 10; }
    .list-item { display: grid; grid-template-columns: 32px 1fr 100px 140px 140px 40px; gap: 8px; padding: 10px 24px; align-items: center; border-bottom: 1px solid #f2f2f7; cursor: pointer; background: #fff; transition: background 0.1s; }
    .list-item:hover { background: #f9f9fb; }
    .list-item.selected { background: #fff0ee; }
    .list-item.active-detail { background: #fff8f7; border-left: 3px solid #EE220C; }
    .list-item-checkbox { display: flex; align-items: center; justify-content: center; }
    .list-item-checkbox input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #EE220C; }
    .list-item-name { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .list-item-name-text { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-item-name-text:hover { color: #EE220C; text-decoration: underline; }
    .list-item-code { font-size: 12px; color: #EE220C; font-weight: 600; }
    .list-item-date { font-size: 12px; color: #8e8e93; }
    .list-item-dots { display: flex; align-items: center; justify-content: center; }
    .dots-btn { width: 28px; height: 28px; border-radius: 6px; background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #8e8e93; }
    .dots-btn:hover { background: #f2f2f7; color: #1c1c1e; }

    /* EMPTY STATE */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; color: #8e8e93; gap: 12px; }
    .empty-state p { font-size: 15px; }

    /* UPLOAD ZONE */
    .upload-zone { border: 2px dashed #c7c7cc; border-radius: 12px; padding: 40px; text-align: center; color: #8e8e93; margin: 16px 24px; transition: border-color 0.15s, background 0.15s; }
    .upload-zone.dragover { border-color: #EE220C; background: #fff0ee; color: #EE220C; }
    .upload-zone p { margin-top: 8px; font-size: 14px; }

    /* RIGHT DETAIL SIDEBAR */
    .right-sidebar { width: 280px; background: #fff; border-left: 1px solid #e5e5ea; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; transition: width 0.2s; }
    .right-sidebar.hidden-sidebar { width: 0; border: none; }
    .detail-tabs { display: flex; border-bottom: 1px solid #e5e5ea; flex-shrink: 0; }
    .detail-tab { flex: 1; padding: 12px; font-size: 13px; font-weight: 500; text-align: center; cursor: pointer; color: #6e6e73; border: none; background: none; border-bottom: 2px solid transparent; }
    .detail-tab.active { color: #EE220C; border-bottom-color: #EE220C; }
    .detail-content { flex: 1; overflow-y: auto; padding: 16px; }
    .detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #c7c7cc; gap: 8px; font-size: 13px; text-align: center; padding: 20px; }

    /* DETAIL FIELDS */
    .detail-field { margin-bottom: 16px; }
    .detail-label { font-size: 11px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .detail-value { font-size: 14px; color: #1c1c1e; }
    .detail-input { width: 100%; font-size: 14px; padding: 6px 8px; border: 1px solid #e5e5ea; border-radius: 6px; outline: none; font-family: inherit; }
    .detail-input:focus { border-color: #EE220C; }
    .detail-actions { display: flex; gap: 6px; margin-top: 6px; }
    .detail-save-btn { padding: 5px 12px; background: #EE220C; color: #fff; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .detail-cancel-btn { padding: 5px 12px; background: #f2f2f7; color: #1c1c1e; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .detail-static { font-size: 13px; color: #6e6e73; }

    /* LOCATION TREE */
    .location-tree { font-size: 13px; }
    .location-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; cursor: pointer; color: #1c1c1e; }
    .location-item:hover { color: #EE220C; }
    .location-item.current { font-weight: 600; color: #1c1c1e; cursor: default; }

    /* VERSION CARDS */
    .version-card { background: #f9f9fb; border-radius: 10px; padding: 12px; margin-bottom: 10px; position: relative; }
    .version-card-header { display: flex; align-items: flex-start; gap: 10px; }
    .version-avatar { width: 32px; height: 32px; border-radius: 50%; background: #EE220C; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .version-info { flex: 1; font-size: 13px; }
    .version-title { font-weight: 600; margin-bottom: 2px; }
    .version-meta { color: #6e6e73; font-size: 12px; line-height: 1.6; }
    .version-dots { position: absolute; top: 8px; right: 8px; }

    /* CONTEXT MENU */
    .context-menu { position: fixed; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); padding: 6px 0; min-width: 200px; z-index: 1000; border: 1px solid #e5e5ea; }
    .context-menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: 14px; cursor: pointer; color: #1c1c1e; }
    .context-menu-item:hover { background: #f2f2f7; }
    .context-menu-item.danger { color: #EE220C; }
    .context-menu-sep { height: 1px; background: #e5e5ea; margin: 4px 0; }

    /* FOLDER TREE (v záložce Složky) */
    .folder-tree { padding: 8px; }
    .folder-tree-item { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .folder-tree-item:hover { background: #f2f2f7; }
    .folder-tree-children { padding-left: 20px; }

    /* RECENT BADGE */
    .recent-section-title { font-size: 13px; font-weight: 600; color: #8e8e93; padding: 16px 24px 8px; }
  </style>
</head>
<body class="login-page" id="body">

<!-- LOGIN -->
<div class="login-card" id="login-screen">
  <h1>10space</h1>
  <p>Přihlas se svým Google účtem</p>
  <button class="primary-btn" onclick="handleGoogleLogin()">Přihlásit se přes Google</button>
  <p id="login-error" class="error hidden"></p>
</div>

<!-- APP -->
<div id="app-screen" class="hidden">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#EE220C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <h1>10space</h1>
    </div>
    <div class="topbar-right">
      <img id="user-avatar" class="user-avatar" src="" alt="" onerror="this.style.display='none'">
      <span class="user-name" id="user-name"></span>
      <button class="logout-btn" onclick="handleLogout()">Odhlásit</button>
    </div>
  </div>

  <!-- APP BODY -->
  <div class="app-body">

    <!-- LEFT SIDEBAR -->
    <div class="left-sidebar">
      <div class="upload-btn-wrap">
        <button class="upload-btn" onclick="openUpload()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nahrát
        </button>
      </div>

      <div class="sidebar-tabs">
        <button class="sidebar-tab active" onclick="switchTab('recent')" id="tab-recent">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Nedávné
        </button>
        <button class="sidebar-tab" onclick="switchTab('documents')" id="tab-documents">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Dokumenty
        </button>
        <button class="sidebar-tab" onclick="switchTab('folders')" id="tab-folders">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Složky
        </button>
        <button class="sidebar-tab" onclick="switchTab('media')" id="tab-media">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Multimédia
        </button>
        <button class="sidebar-tab" onclick="switchTab('projects')" id="tab-projects">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="6" height="18" rx="1"/><rect x="9" y="3" width="6" height="18" rx="1"/><rect x="16" y="3" width="6" height="18" rx="1"/></svg>
          Projekty
        </button>
        <button class="sidebar-tab" onclick="switchTab('favorites')" id="tab-favorites">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Oblíbené
        </button>
      </div>

      <!-- FOLDER TREE (zobrazí se v záložce Složky) -->
      <div id="sidebar-folder-tree" class="hidden"></div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="main-content"
      ondragover="event.preventDefault();document.getElementById('upload-zone').classList.add('dragover')"
      ondragleave="document.getElementById('upload-zone').classList.remove('dragover')"
      ondrop="handleDrop(event)">

      <!-- CONTENT HEADER -->
      <div class="content-header" id="content-header">
        <div class="content-title" id="content-title">Nedávné</div>
        <div class="breadcrumb" id="breadcrumb"></div>
      </div>

      <!-- MULTI-SELECT TOOLBAR -->
      <div class="multi-toolbar hidden" id="multi-toolbar">
        <span id="multi-count">0 vybráno</span>
        <button class="multi-toolbar-btn" onclick="multiDownload()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Stáhnout
        </button>
        <button class="multi-toolbar-btn" onclick="multiMove()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
          Přesunout
        </button>
        <button class="multi-toolbar-btn danger" onclick="multiDelete()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          Smazat
        </button>
      </div>

      <!-- UPLOAD ZONE -->
      <div class="upload-zone hidden" id="upload-zone">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        <p>Přetáhni soubory sem nebo <label style="color:#EE220C;cursor:pointer;font-weight:600">vyber ze zařízení<input type="file" multiple style="display:none" onchange="handleFileSelect(event)"></label></p>
      </div>

      <!-- LIST HEADER -->
      <div class="list-header" id="list-header">
        <div>
          <input type="checkbox" id="select-all" onchange="toggleSelectAll(this.checked)" style="width:16px;height:16px;accent-color:#EE220C;cursor:pointer;">
        </div>
        <div>Název</div>
        <div>Kód</div>
        <div>Přidáno</div>
        <div>Změněno</div>
        <div></div>
      </div>

      <!-- CONTENT AREA -->
      <div id="content-area"></div>
    </div>

    <!-- RIGHT DETAIL SIDEBAR -->
    <div class="right-sidebar hidden-sidebar" id="right-sidebar">
      <div class="detail-tabs">
        <button class="detail-tab active" onclick="switchDetailTab('details')" id="dtab-details">Podrobnosti</button>
        <button class="detail-tab" onclick="switchDetailTab('versions')" id="dtab-versions">Verze</button>
      </div>
      <div class="detail-content" id="detail-content">
        <div class="detail-empty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <p>Vyber soubor<br>pro zobrazení detailů</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- CONTEXT MENU -->
<div class="context-menu hidden" id="context-menu">
  <div class="context-menu-item" onclick="contextAction('download')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Stáhnout
  </div>
  <div class="context-menu-item" onclick="contextAction('rename')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Přejmenovat
  </div>
  <div class="context-menu-item" onclick="contextAction('duplicate')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    Duplikovat
  </div>
  <div class="context-menu-item" onclick="contextAction('copylink')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    Kopírovat odkaz
  </div>
  <div class="context-menu-item" onclick="contextAction('info')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Informace
  </div>
  <div class="context-menu-sep"></div>
  <div class="context-menu-item danger" onclick="contextAction('delete')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    Smazat
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjDCB3gpqytTHnG7zKLKJGXMNeW5vyC_I",
  authDomain: "base-39f52.firebaseapp.com",

// AUTH
window.handleGoogleLogin = async () => {
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    const snapshot = await get(ref(db, "/members"));
    const members = snapshot.val();
    const member = Object.values(members).find(m => m.email === result.user.email);
    if (!member) {
      document.getElementById("login-error").textContent = "Přístup zamítnut";
      document.getElementById("login-error").classList.remove("hidden");
      await signOut(auth);
      return;
    }
    currentUser = { ...member, photoURL: result.user.photoURL };
  } catch(err) {
    document.getElementById("login-error").textContent = "Chyba: " + err.message;
    document.getElementById("login-error").classList.remove("hidden");
  }
};

window.handleLogout = async () => { await signOut(auth); location.reload(); };

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const snapshot = await get(ref(db, "/members"));
    const members = snapshot.val();
    const member = Object.values(members).find(m => m.email === user.email);
    if (!member) { await signOut(auth); return; }
    currentUser = { ...member, photoURL: user.photoURL };
    showApp();
  }
});

function showApp() {
  document.getElementById("body").classList.remove("login-page");
  document.getElementById("login-screen").classList.add("hidden");

  document.getElementById("user-name").textContent = currentUser.name || currentUser.email;

}

// LOAD DATA
async function loadData() {
  const [foldersSnap, docsSnap] = await Promise.all([
    get(ref(db, "/slozky")),
    get(ref(db, "/dokumenty"))
  ]);
  allFolders = foldersSnap.val() || {};
  window.allDocs = docsSnap.val() || {};
  renderFolderTree();
  switchTab("recent");
}

// FOLDER TREE
function renderFolderTree() {
  const tree = document.getElementById("sidebar-folder-tree");
  tree.innerHTML = buildFolderTree(null, 0);
}

function buildFolderTree(parentId, depth) {
  const children = Object.entries(allFolders).filter(([id, f]) => f.rodic === parentId);
  if (children.length === 0) return "";
  return children.map(([id, f]) => `
    <div class="folder-tree-item" style="padding-left:${8 + depth * 16}px" onclick="navigateToFolder('${id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      ${f.nazev}
    </div>
    ${buildFolderTree(id, depth + 1)}
  `).join("");
}

// TABS
window.switchTab = (tab) => {
  currentTab = tab;
  selectedItems.clear();
  window.currentFolder = null;

  document.querySelectorAll(".sidebar-tab").forEach(t => t.classList.remove("active"));
  document.getElementById(`tab-${tab}`)?.classList.add("active");

  const folderTree = document.getElementById("sidebar-folder-tree");
  folderTree.classList.toggle("hidden", tab !== "folders");

  const titles = {
    recent: "Nedávné", documents: "Dokumenty",
    folders: "Složky", media: "Multimédia",
    projects: "Projekty", favorites: "Oblíbené"
  };
  document.getElementById("content-title").textContent = titles[tab] || tab;
  document.getElementById("breadcrumb").innerHTML = "";

  renderTab();

function renderTab() {
  const area = document.getElementById("content-area");
  let items = Object.entries(window.allDocs);

  if (currentTab === "recent") {
    items = items.sort(([,a],[,b]) => (b.datumNahrani||0) - (a.datumNahrani||0)).slice(0, 20);
  } else if (currentTab === "documents") {
    items = items.filter(([,d]) => {
      const m = d.mimeType || "";
      return m.includes("pdf") || m.includes("document") || m.includes("spreadsheet") || m.includes("presentation") || m.includes("text");
    });
  } else if (currentTab === "media") {
    items = items.filter(([,d]) => {
      const m = d.mimeType || "";
      return m.includes("image") || m.includes("video") || m.includes("audio");
    });
  } else if (currentTab === "folders") {
    renderFolderContent(null);
    return;
  } else if (currentTab === "projects") {
    area.innerHTML = `<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="6" height="18" rx="1"/><rect x="9" y="3" width="6" height="18" rx="1"/><rect x="16" y="3" width="6" height="18" rx="1"/></svg><p>Projekty budou dostupné brzy</p></div>`;
    return;
  } else if (currentTab === "favorites") {
    area.innerHTML = `<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><p>Zatím žádné oblíbené</p></div>`;
    return;
  }

  renderListItems(items);
}

// FOLDER NAVIGATION
window.navigateToFolder = (folderId) => {
  window.currentFolder = folderId;
  selectedItems.clear();
  renderFolderContent(folderId);
  renderBreadcrumb(folderId);
};

function renderFolderContent(folderId) {
  const subfolders = Object.entries(allFolders).filter(([id, f]) => f.rodic === folderId);
  const docs = Object.entries(window.allDocs).filter(([id, d]) => d.slozkaId === folderId);

  const folderItems = subfolders.map(([id, f]) => ({ id, type: "folder", nazev: f.nazev, datumNahrani: null }));
  const docItems = docs.map(([id, d]) => ({ id, type: "doc", ...d }));

  renderListItems([...folderItems.map(f => [f.id, f]), ...docItems.map(d => [d.id, d])], true);
}

function renderBreadcrumb(folderId) {
  const crumbs = [{ id: null, name: "10space" }];
  let id = folderId;
  const trail = [];
  while (id) {
    const f = allFolders[id];
    if (!f) break;
    trail.unshift({ id, name: f.nazev });
    id = f.rodic;
  }
  const all = [...crumbs, ...trail];
  document.getElementById("breadcrumb").innerHTML = all.map((c, i) =>
    i < all.length - 1
      ? `<span onclick="navigateToFolder('${c.id}')">${c.name}</span><span class="sep">›</span>`
      : `<span style="color:#1c1c1e;font-weight:500">${c.name}</span>`
  ).join("");
}

function renderDetailContent() {

  if (!item) return;

  const content = document.getElementById("detail-content");

  if (activeDetailTab === "details") {

    content.innerHTML = `
      <div class="detail-field">
        <div class="detail-label">Název</div>

               onfocus="showDetailActions('name')" onblur="hideDetailActions('name', event)">

        </div>
      </div>

        <div class="detail-label">Komentář</div>
        <textarea class="detail-input" id="detail-comment-input" rows="3"
                  onfocus="showDetailActions('comment')" onblur="hideDetailActions('comment', event)"
                  style="resize:none">${item.komentar || ""}</textarea>
        <div class="detail-actions hidden" id="detail-comment-actions">
          <button class="detail-save-btn" onclick="saveDetailComment()">Uložit</button>
          <button class="detail-cancel-btn" onclick="cancelDetailComment()">Zrušit</button>
        </div>
      </div>
      <div class="detail-field">
        <div class="detail-label">Vytvořeno</div>
        <div class="detail-static">${created}</div>
      </div>
      <div class="detail-field">
        <div class="detail-label">Nahráno kým</div>
        <div class="detail-static">${doc?.nahralKdo || "—"}</div>
      </div>
      <div class="detail-field">
        <div class="detail-label">Umístění</div>
        <div class="location-tree">${renderLocationTree(doc?.slozkaId)}</div>
      </div>
    `;
  } else {
    const verze = doc?.verejneVerze || {};
    const keys = Object.keys(verze).sort((a,b) => b - a);
    if (keys.length === 0) {
      content.innerHTML = `<div class="detail-empty"><p>Žádné verze</p></div>`;
      return;
    }
    content.innerHTML = keys.map(k => {
      const v = verze[k];
      const initials = (v.nahralKdo || "?").split("@")[0].slice(0,2).toUpperCase();
      return `
        <div class="version-card">
          <div class="version-card-header">
            <div class="version-avatar">${initials}</div>
            <div class="version-info">
              <div class="version-title">Verze ${k}</div>
              <div class="version-meta">
                Nahráno: ${v.nahralKdo || "—"}<br>
                Datum: ${v.datum || "—"}<br>
                ${v.poznamka ? `Poznámka: ${v.poznamka}` : ""}
              </div>
            </div>
          </div>
          <div class="version-dots">
            <button class="dots-btn" onclick="openVersionMenu(event, '${selectedDetailId}', '${k}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            </button>
          </div>
        </div>
      `;
    }).join("");
  }
}

function renderLocationTree(slozkaId) {
  if (!slozkaId) return '<div class="location-item current" style="padding-left:0">10space</div>';
  const trail = [];
  let id = slozkaId;
  while (id) {
    const f = allFolders[id];
    if (!f) break;
    trail.unshift({ id, name: f.nazev });
    id = f.rodic;
  }
  return [{ id: null, name: "10space" }, ...trail].map((c, i, arr) =>
    i < arr.length - 1
      ? `<div class="location-item" style="padding-left:${i * 12}px" onclick="navigateToFolder('${c.id}')">
           <span style="color:#c7c7cc;margin-right:4px">${"—".repeat(i)}${"›"}</span>${c.name}
         </div>`
      : `<div class="location-item current" style="padding-left:${i * 12}px">
           <span style="color:#c7c7cc;margin-right:4px">${"—".repeat(i)}${"›"}</span>${c.name}
         </div>`
  ).join("");
}

// OPEN DOCUMENT
window.openDocument = async (docId) => {
  try {
    const token = await auth.currentUser.getIdToken();
    const response = await fetch(FUNCTIONS.getFileUrl, {
      method: "POST",
      headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify({ docId })
    });

    if (data.url) {
      const a = document.createElement("a");
      a.href = data.url; a.target = "_blank"; a.rel = "noopener";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    } else {

};

window.openContextMenu = (e, id, isFolder) => {
  contextItemId = id;
  const menu = document.getElementById("context-menu");
  menu.classList.remove("hidden");
  const x = e.clientX, y = e.clientY;
  menu.style.left = (x + 200 > window.innerWidth ? x - 200 : x) + "px";

document.addEventListener("click", closeContextMenu);

window.contextAction = async (action) => {
  closeContextMenu();
  if (!contextItemId) return;
  const doc = window.allDocs[contextItemId];

  if (action === "delete") {
    if (!confirm(`Smazat "${doc?.nazev}"?`)) return;
    const token = await auth.currentUser.getIdToken();
    const res = await fetch(FUNCTIONS.deleteFile, {
      method: "POST",
      headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify({ docId: contextItemId })
    });
    const data = await res.json();
    if (data.success) { delete window.allDocs[contextItemId]; renderTab(); }
    else alert("Chyba: " + data.error);

  } else if (action === "rename") {
    const newName = prompt("Nový název:", doc?.nazev);
    if (newName && newName !== doc?.nazev) {
      await set(ref(db, `/dokumenty/${contextItemId}/nazev`), newName);
      window.allDocs[contextItemId].nazev = newName;
      renderTab();
    }

  } else if (action === "copylink") {
    const token = await auth.currentUser.getIdToken();
    const res = await fetch(FUNCTIONS.getFileUrl, {
      method: "POST",
      headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify({ docId: contextItemId })
    });
    const data = await res.json();
    if (data.url) { await navigator.clipboard.writeText(data.url); alert("Odkaz zkopírován"); }

  } else if (action === "download") {
    await openDocument(contextItemId);

  } else if (action === "info") {
    showDetail(contextItemId, false);

  } else if (action === "duplicate") {
    alert("Duplikovat — bude implementováno");
  }
};

async function processFiles(files) {
  if (!window.currentFolder) {
    alert("Nejdřív vyber složku kam chceš nahrát.");
    return;
  }
  for (const file of files) {
    try {
      const base64Data = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      const token = await auth.currentUser.getIdToken();
      const response = await fetch(FUNCTIONS.uploadFile, {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ fileName: file.name, mimeType: file.type, base64Data, slozkaId: window.currentFolder })
      });
      const data = await response.json();
      if (!data.driveFileId) throw new Error(data.error || "Upload selhal");

      const fileId = crypto.randomUUID();
      const docRef = ref(db, `/dokumenty/${fileId}`);
      const docData = {
        nazev: file.name, kategorie: null, stav: null,
        slozkaId: window.currentFolder, storage: "gdrive",
        mimeType: file.type, zdroj: "10space",
        nahralKdo: currentUser.email, datumNahrani: Date.now(),
        evidCislo: "—",
        verejneVerze: { 1: { driveFileId: data.driveFileId, datum: new Date().toISOString().split("T")[0], poznamka: "První nahrání", nahralKdo: currentUser.email } }
      };
      await set(docRef, docData);
      window.allDocs[fileId] = docData;
      console.log(`Nahráno: ${file.name}`);
    } catch(err) { alert(`Chyba: ${err.message}`); }
  }
  document.getElementById("upload-zone").classList.add("hidden");
  renderTab();
}
</script>
